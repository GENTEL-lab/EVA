# ========================================================================
# gRNA微调实验配置模板
# ========================================================================
# 用途: 从预训练模型进行全参数微调，训练gRNA序列生成
#
# 使用方法:
#   1. 复制此文件到你的实验目录
#   2. 修改配置参数（特别是标记为【必须修改】的部分）
#   3. 使用 run_gRNA_finetuning.sh 启动训练
#
# 微调特点:
#   1. 只使用RNA类型条件（Y_RNA），不使用物种前缀
#   2. EOS token增加loss权重，帮助模型学会正确断句
#   3. 从预训练checkpoint继续训练（只加载模型权重）
# ========================================================================

data_config:
  # 【必须修改】数据集名称
  dataset: gRNA_iscb

  max_seq_length: 8192
  max_samples: null

  # 【必须修改】训练数据文件路径
  train_file: ./finetune/gRNA/data/iscb_good.fasta

  # 【不使用】物种前缀相关配置
  lineage_file: null

  use_direction_tokens: true

  # ============================================
  # 微调核心配置：前缀设置
  # ============================================
  # 不使用物种层次分类学前缀
  use_lineage_prefix: false

  # 使用RNA类型前缀
  use_rna_type_prefix: true

  # RNA类型token: 使用Y_RNA
  rna_type_token: Y_RNA

  # ============================================
  # Pretraining任务混合比例（0.0-1.0）
  # 0.0 = 纯微调（全部使用条件前缀）
  # ============================================
  pretrain_ratio: 0

  # 启用反向序列增强（3'->5'方向）
  enable_reverse_augmentation: true

  # Chunked dataset配置（内存高效）
  use_chunked: true
  cache_size: 10000
  force_rebuild_index: false

  # Mixed GLM Configuration - 纯CLM模式
  mode: "mixed"
  glm_probability: 0.333

  # Span配置（用于GLM任务）
  span_config:
    max_coverage_ratios: [0.15, 0.35, 0.55, 0.75]
    coverage_probs: [0.2, 0.3, 0.3, 0.2]
    span_distributions:
      - [6, 3]
      - [40, 15]
      - [60, 15]
      - [150, 50]
      - [400, 100]
      - [800, 200]
    max_num_spans: 30
    allow_overlap: false

model_config:
  vocab_size: 114

  # ============================================
  # 模型架构配置（与预训练模型保持一致）
  # 【注意】这些参数必须与预训练checkpoint匹配
  # ============================================
  hidden_size: 1024
  num_hidden_layers: 26
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 3072
  max_position_embeddings: 8192
  rms_norm_eps: 1e-6
  initializer_range: 0.02
  use_cache: true
  num_experts: 8
  num_experts_per_tok: 2
  expert_capacity_factor: 1.5
  router_aux_loss_coef: 0.01
  moe_implementation: megablocks
  moe_world_size: 4

  # Dropout配置
  resid_dropout: 0
  hidden_dropout: 0
  dropout_warmup_steps: 0
  dropout_ramp_steps: 0
  dropout_schedule: "linear"

  # Stage 2/3 features
  attention_dropout: 0.0
  gradient_clip_norm: 1.0
  label_smoothing: 0.0

  # EOS loss权重
  eos_loss_weight: 1.0

training_config:
  # 【必须修改】实验名称
  run_name: gRNA_finetuning_v1_YRNA

  # 【必须修改】输出目录
  output_dir: ./results/gRNA_finetuning/gRNA_finetuning_v1_YRNA

  # ============================================
  # 微调核心配置：预训练checkpoint路径
  # 【必须修改】指向你的预训练模型checkpoint
  # ============================================
  resume_from_pretrain: ./finetune/checkpoint/1400M_mid_25500_old

  # ============================================
  # Batch配置
  # ============================================
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1

  # ============================================
  # 学习率配置
  # ============================================
  learning_rate: 5.0e-5

  weight_decay: 1.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1e-8

  # 训练轮数
  max_epochs: 50

  min_lr_ratio: 0.1
  bf16: true
  fp16: false
  gradient_checkpointing: false
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # 日志和保存频率
  logging_steps: 10
  save_steps: 1000

  seed: 42

  # warmup步数
  warmup_steps: 100

  # 最大训练时间（小时）
  max_wall_time_hours: 48

distributed_config:
  backend: nccl
  data_parallel_size: 4
  expert_parallel_size: 4
  weight_parallel_size: 1

memory_config:
  cleanup_frequency: 100
  gc_frequency: 50
  enable_monitoring: true

logging_config:
  enable_wandb: true
  wandb_project: eva-gRNA-finetuning
  wandb_run_name: gRNA_finetuning_v1
  log_dir: ./results/gRNA_finetuning/gRNA_finetuning_v1_YRNA/logs
