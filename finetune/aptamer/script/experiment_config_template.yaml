# ========================================================================
# Aptamer微调实验配置模板
# ========================================================================
# 用途: 从预训练模型进行全参数微调，训练特定RNA类型（如aptamer）
#
# 使用方法:
#   1. 复制此文件到你的实验目录
#   2. 修改配置参数（特别是标记为【必须修改】的部分）
#   3. 使用 run_aptamer_finetuning.sh 启动训练
#
# 微调特点:
#   1. 使用现有RNA类型token（aptamer使用<rna_Y_RNA>）
#   2. 可选择是否使用物种层次分类学前缀
#   3. EOS token增加loss权重，帮助模型学会正确断句
#   4. 从预训练checkpoint继续训练（只加载模型权重）
#
# RNA类型映射:
#   - aptamer -> <rna_Y_RNA> (Y RNA)
#   - virus -> <rna_viral_RNA> (病毒RNA)
#   - gRNA -> <rna_sRNA> (小RNA)
# ========================================================================

data_config:
  # 【必须修改】数据集名称
  dataset: tfr1_aptamer

  max_seq_length: 8192
  max_samples: null

  # 【必须修改】训练数据文件路径
  train_file: ./finetune/aptamer/data/lg/tfr1_aptamer.fasta

  # 【可选】如果使用物种前缀，需要提供谱系文件
  lineage_file: ./data/training_data/lineage_greengenes.tsv

  use_direction_tokens: true

  # ============================================
  # 微调核心配置：前缀设置
  # ============================================
  # 【可选修改】是否使用物种层次分类学前缀
  # true: 使用谱系前缀（如 d__Bacteria;p__Proteobacteria;...）
  # false: 不使用谱系前缀（推荐用于aptamer等非生物序列）
  use_lineage_prefix: false

  # 【推荐保持true】是否使用RNA类型前缀
  # true: 添加<rna_sRNA>等类型标记
  # false: 不添加类型标记
  use_rna_type_prefix: true

  # 【RNA类型token】使用现有词表中的token
  # 可选值: sRNA, mRNA, rRNA, tRNA, lncRNA, circRNA, viral_RNA, miRNA, Y_RNA, etc.
  # aptamer推荐使用 Y_RNA
  rna_type_token: Y_RNA

  # ============================================
  # Pretraining任务混合比例（0.0-1.0）
  # 控制多少比例的样本使用无前缀的纯序列格式
  # 0.0 = 纯微调（全部使用条件前缀）
  # 0.1 = 10%无前缀 + 90%带前缀（推荐）
  # 1.0 = 纯pretraining（全部无前缀）
  # ============================================
  pretrain_ratio: 0

  # 【可选】是否启用反向序列增强（3'->5'方向）
  enable_reverse_augmentation: true

  # Chunked dataset配置（内存高效）
  use_chunked: true
  cache_size: 10000
  force_rebuild_index: false

  # Mixed GLM Configuration - CLM:GLM = 2:1
  mode: "mixed"
  glm_probability: 0

  # Span配置（用于GLM任务）
  span_config:
    max_coverage_ratios: [0.15, 0.35, 0.55, 0.75]
    coverage_probs: [0.2, 0.3, 0.3, 0.2]
    span_distributions:
      - [6, 3]
      - [40, 15]
      - [60, 15]
      - [150, 50]
      - [400, 100]
      - [800, 200]
    max_num_spans: 30
    allow_overlap: false

model_config:
  vocab_size: 114

  # ============================================
  # 模型架构配置（与预训练模型保持一致）
  # 【注意】这些参数必须与预训练checkpoint匹配
  # ============================================
  hidden_size: 1024
  num_hidden_layers: 26
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 3072
  max_position_embeddings: 8192
  rms_norm_eps: 1e-6
  initializer_range: 0.02
  use_cache: true
  num_experts: 8
  num_experts_per_tok: 2
  expert_capacity_factor: 1.5
  router_aux_loss_coef: 0.01
  moe_implementation: megablocks
  moe_world_size: 4

  # Dropout配置（微调时可以适当增加dropout防止过拟合）
  # 【可选修改】根据数据集大小调整
  resid_dropout: 0
  hidden_dropout: 0
  dropout_warmup_steps: 0
  dropout_ramp_steps: 0
  dropout_schedule: "linear"

  # Stage 2/3 features
  attention_dropout: 0.0
  gradient_clip_norm: 1.0
  label_smoothing: 0.0

  # ============================================
  # 微调核心配置：EOS loss权重
  # 【可选修改】增加权重帮助模型学会正确断句
  # 1.0 = 正常权重
  # 2.0-5.0 = 增加权重（推荐用于短序列）
  # ============================================
  eos_loss_weight: 1.0

training_config:
  # 【必须修改】实验名称
  run_name: tfr1_aptamer_finetuning

  # 【必须修改】输出目录
  output_dir: ./results/aptamer_finetuning/tfr1_aptamer_finetuning

  # ============================================
  # 微调核心配置：预训练checkpoint路径
  # 【必须修改】指向你的预训练模型checkpoint
  # ============================================
  resume_from_pretrain: ./finetune/checkpoint/1400M_mid_25500_old
  # ============================================
  # Batch配置
  # 【可选修改】根据GPU内存和数据集大小调整
  # 有效batch size = per_device_batch * grad_accum * num_gpus
  # 例如: 8 * 16 * 8 = 1024
  # ============================================
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1

  # ============================================
  # 学习率配置
  # 【可选修改】微调通常使用较小的学习率
  # 推荐范围: 1e-5 到 1e-4
  # ============================================
  learning_rate: 5.0e-5

  weight_decay: 1.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1e-8

  # 【可选修改】训练轮数（根据数据集大小调整）
  max_epochs: 15

  min_lr_ratio: 0.1
  bf16: true
  fp16: false
  gradient_checkpointing: false
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # 【可选修改】日志和保存频率
  logging_steps: 10
  save_steps: 500

  seed: 42

  # 【可选修改】warmup步数（通常为总步数的5-10%）
  warmup_steps: 100

  # 【可选修改】最大训练时间（小时）
  max_wall_time_hours: 48

distributed_config:
  backend: nccl
  # 【注意】这些参数必须与GPU配置匹配
  # 单机8卡: data_parallel_size=4, expert_parallel_size=4
  data_parallel_size: 4
  expert_parallel_size: 4
  weight_parallel_size: 1

memory_config:
  cleanup_frequency: 100
  gc_frequency: 50
  enable_monitoring: true

logging_config:
  # 【可选修改】是否启用wandb日志
  enable_wandb: true
  wandb_project: eva-aptamer-finetuning

  # 【必须修改】wandb运行名称
  wandb_run_name: tfr1_aptamer_finetuning

  # 【必须修改】日志目录
  log_dir: ./results/aptamer_finetuning/tfr1_aptamer_finetuning/logs
