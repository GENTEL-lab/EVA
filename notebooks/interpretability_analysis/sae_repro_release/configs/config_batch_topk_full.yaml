normalize_decoder: true
dead_feature_window: 2500

max_steps: 200000
warmup_steps: 1000
hold_lr_until: 12000
decay_start: 12000
decay_end: 12500

device: cuda:0
seed: 42
deterministic: true
log_every: 500
save_every: 5000
buffer_size: 5000000
