paths:
  base: ""
  ckpt: ""
  data: ""
  output_root: ""

layer: 13
mode: batch_topk

d_hidden: 8192
k: 32

n_seqs: 30000000
seq_batch: 32
max_len: 8192
n_epochs: 1

batch_size: 4096
lr: 5.0e-5
aux_coef: 0.03
grad_clip: 1.0

lr_schedule: trapezoid
trapezoid_warmup_ratio: 0.05
